id: uwmadison
label: University of Wisconsin-Madison
site:
  title: UW-Madison Geoportal
  short_name: UW-Madison Geoportal
  description: Search geospatial resources from the University of Wisconsin-Madison.
  locale: en
  supported_locales:
    - en
  show_theme_selector: true
  routing:
    mode: browser
  manifest:
    background_color: '#C5050C'
    theme_color: '#C5050C'
institution:
  name: UW-Madison Geoportal
  logo_url: /uw-madison-logo.svg
  logo_alt: UW-Madison Geoportal logo
  hero_text: Search geospatial resources from the University of Wisconsin-Madison and the OpenGeoMetadata community.
  hero_description: Browse and download GIS data, maps, and other geospatial resources.
branding:
  colors:
    primary: '#C5050C'
    active: '#9B0000'
  fonts:
    sans: '"Work Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
api:
  base_url: https://lib-btaageoapi-dev-app-01.oit.umn.edu/api/v1
  search_path: /search
  suggest_path: /suggest
  gazetteer_search_path: /gazetteers/nominatim/search
  facets_path_template: /search/facets/{facetName}
  map_h3_path: /map/h3
  home_blog_posts_path: /home/blog-posts
  turnstile_status_path: /turnstile/status
  turnstile_verify_path: /turnstile/verify
  client_name: ogm-viewer
  default_query_params:
    - include_filters[schema_provider_s][]=University of Wisconsin-Madison
navigation:
  links:
    - href: /bookmarks
      label: Bookmarks
      external: false
footer:
  style: simple
  show_api_debug: true
