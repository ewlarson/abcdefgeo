    logo_height_rem: 4.5
    lockup_gap_rem: 1
    lockup_separator_height_rem: 3.25
    lockup_text_size_rem: 1.95
  hero_text:
    en: Discover maps, data and spatial scholarship with a Nevada point of view.
  hero_description:
    en: This pilot reimagines the OpenGeoMetadata viewer as a University of Nevada, Reno web property while connecting directly to the live BTAA Geospatial API for search, browse and record discovery.
