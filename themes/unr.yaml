id: unr
label: University of Nevada, Reno
site:
  title:
    en: University of Nevada, Reno Geoportal
  short_name: University Libraries
  description:
    en: Search geospatial resources through a University of Nevada, Reno pilot interface powered by the BTAA Geospatial API.
  canonical_url: https://www.unr.edu
  locale: en
  supported_locales:
    - en
  show_locale_selector: false
  show_theme_selector: false
  routing:
    mode: browser
  manifest:
    display: standalone
    background_color: '#041E42'
    theme_color: '#041E42'
institution:
  name: University of Nevada, Reno Geoportal
  logo_url: /unr-block-n.svg
  logo_alt:
    en: University of Nevada, Reno Block N
  logo_lockup:
    separator: pipe
    right_text:
      en: University of Nevada, Reno
    right_text_style:
      font_family: '"myriad-pro", Arial, sans-serif'
      font_weight: 700
      letter_spacing: 0.01em
    subtext:
      en: University Libraries
    subtext_style:
      font_family: '"myriad-pro-condensed", "Arial Narrow", Arial, sans-serif'
      font_weight: 700
      letter_spacing: 0.16em
