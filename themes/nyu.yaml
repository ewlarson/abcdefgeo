id: nyu
label: New York University
site:
  title: NYU Spatial Data Repository
  short_name: NYU Spatial Data Repository
  description: Search geospatial resources from New York University.
  locale: en
  supported_locales:
    - en
  show_theme_selector: true
  routing:
    mode: browser
  manifest:
    background_color: '#57068C'
    theme_color: '#57068C'
institution:
  name: NYU Spatial Data Repository
  logo_url: /nyu-logo.svg
  logo_alt: NYU Spatial Data Repository logo
  hero_text: Search geospatial resources from New York University and the OpenGeoMetadata community.
  hero_description: Browse and download GIS data, maps, and other geospatial resources.
branding:
  colors:
    primary: '#57068C'
    active: '#8900E1'
  fonts:
    sans: '"Work Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
api:
  base_url: https://lib-btaageoapi-dev-app-01.oit.umn.edu/api/v1
  search_path: /search
  suggest_path: /suggest
  gazetteer_search_path: /gazetteers/nominatim/search
  facets_path_template: /search/facets/{facetName}
  map_h3_path: /map/h3
  home_blog_posts_path: /home/blog-posts
  turnstile_status_path: /turnstile/status
  turnstile_verify_path: /turnstile/verify
  client_name: ogm-viewer
  default_query_params:
    - include_filters[ogm_repo][]=edu.nyu
navigation:
  links:
    - href: /bookmarks
      label: Bookmarks
      external: false
footer:
  style: simple
  show_api_debug: true
