default_theme: "unr"

themes:
  unr:
    label: "University of Nevada, Reno"
    site:
      title:
        en: "University of Nevada, Reno Geoportal"
      short_name: "University Libraries"
      description:
        en: "Search geospatial resources through a University of Nevada, Reno pilot interface powered by the BTAA Geospatial API."
      canonical_url: "https://www.unr.edu"
      locale: "en"
      supported_locales:
        - "en"
      show_locale_selector: false
      show_theme_selector: false
      routing:
        mode: "browser"
      manifest:
        display: "standalone"
        background_color: "#041E42"
        theme_color: "#041E42"
    institution:
      name: "University of Nevada, Reno Geoportal"
      logo_url: "/unr-block-n.svg"
      logo_alt:
        en: "University of Nevada, Reno Block N"
      logo_lockup:
        separator: "pipe"
        right_text:
          en: "University of Nevada, Reno"
        right_text_style:
          font_family: "\"myriad-pro\", Arial, sans-serif"
          font_weight: 700
          letter_spacing: "0.01em"
        subtext:
          en: "University Libraries"
        subtext_style:
          font_family: "\"myriad-pro-condensed\", \"Arial Narrow\", Arial, sans-serif"
          font_weight: 700
          letter_spacing: "0.16em"
      header:
        logo_height_rem: 4.5
        lockup_gap_rem: 1
        lockup_separator_height_rem: 3.25
        lockup_text_size_rem: 1.95
      hero_text:
        en: "Discover maps, data and spatial scholarship with a Nevada point of view."
      hero_description:
        en: "This pilot reimagines the OpenGeoMetadata viewer as a University of Nevada, Reno web property while connecting directly to the live BTAA Geospatial API for search, browse and record discovery."
    branding:
      colors:
        primary: "#041E42"
        active: "#007AB8"
        surface: "#FFFFFF"
        surface_alt: "#ECEEEF"
        text: "#3A3B3E"
        muted: "#5D6166"
        border: "#D1D2D3"
        page_background: "#F3F5F7"
        header_background: "#FFFFFF"
        header_text: "#041E42"
        utility_background: "#041E42"
        utility_text: "rgba(255,255,255,0.92)"
        hero_panel_background: "rgba(255,255,255,0.88)"
        hero_panel_accent: "#041E42"
        footer_overlay: "rgba(4,30,66,0.88)"
        footer_panel_background: "rgba(255,255,255,0.08)"
        button_primary_hover: "#0B2D5C"
        button_secondary_hover: "#EEF2F5"
        button_secondary_text: "#041E42"
        button_secondary_border: "#B7BCC2"
        lockup_background: "#FFFFFF"
        lockup_foreground: "#041E42"
      fonts:
        sans: "\"unr-custom\", \"myriad-pro\", Arial, sans-serif"
        heading: "\"myriad-pro-condensed\", \"Arial Narrow\", Arial, sans-serif"
        ui: "\"myriad-pro-condensed\", \"Arial Narrow\", Arial, sans-serif"
      assets:
        font_stylesheets:
          - "https://www.unr.edu/Assets/Styles/Fonts/_MainFonts.min.css"
    api:
      base_url: "https://lib-btaageoapi-dev-app-01.oit.umn.edu/api/v1"
      search_path: "/search"
      suggest_path: "/suggest"
      gazetteer_search_path: "/gazetteers/nominatim/search"
      facets_path_template: "/search/facets/{facetName}"
      map_h3_path: "/map/h3"
      home_blog_posts_path: "/home/blog-posts"
      turnstile_status_path: "/turnstile/status"
      turnstile_verify_path: "/turnstile/verify"
      client_name: "unr-geoportal"
      default_query_params: []
    navigation:
      utility_links:
        - href: "https://www.unr.edu/nevada-today"
          label:
            en: "News"
          external: true
        - href: "https://library.unr.edu/"
          label:
            en: "Libraries"
          external: true
        - href: "https://maps.unr.edu"
          label:
            en: "Campus Map"
          external: true
      cta:
        href: "https://www.unr.edu"
        label:
          en: "University Home"
        external: true
      links:
        - href: "/search?q="
          label:
            en: "Search"
          external: false
        - href: "/map"
          label:
            en: "Map"
          external: false
        - href: "/bookmarks"
          label:
            en: "Bookmarks"
          external: false
        - href: "https://library.unr.edu/"
          label:
            en: "Research Help"
          external: true
    homepage:
      hero_background_image_url: "https://www.unr.edu/web-team/uploads/facebook-open-graph.jpg"
      hero_actions:
        - href: "/search?q="
          label:
            en: "Search resources"
          external: false
        - href: "https://maps.unr.edu"
          label:
            en: "Campus map"
          external: true
      featured_items:
        - id: "a10a0f50-994e-0134-2096-0050569601ca-c"
          camera:
            mode: "fitBounds"
            duration: 1.5
        - id: "c69b75a12ca64324a0109d48db735f6d_0"
          camera:
            mode: "flyTo"
            minZoom: 3
            maxZoom: 10
            padding: [24, 24]
            verticalOffsetPx: -120
            duration: 1
      collection_spotlights:
        - title:
            en: "Nevada and the Great Basin"
          description:
            en: "Start with Nevada-focused results, regional cartography and western place-based discovery surfaced live from the BTAA Geospatial API."
          collection_url: "/search?q=Nevada"
          collection_label:
            en: "Explore Nevada results"
          browse_url: "/search?q=Nevada&view=gallery&per_page=20"
          browse_label:
            en: "Browse Nevada resources"
          featured_item_title:
            en: "Nevada-focused geospatial discovery"
          featured_item_url: "/search?q=Nevada&view=gallery&per_page=20"
          image_src: "https://www.unr.edu/web-team/uploads/facebook-open-graph.jpg"
          image_alt:
            en: "Campus view at the University of Nevada, Reno"
        - title:
            en: "Water, fire and land stewardship"
          description:
            en: "Use the pilot interface to move from a branded institutional landing page into live watershed, fire and land-use searches without leaving the static frontend."
          collection_url: "/search?q=watershed"
          collection_label:
            en: "Explore watershed results"
          browse_url: "/search?q=watershed&per_page=20"
          browse_label:
            en: "Browse stewardship resources"
          featured_item_title:
            en: "Watershed and land-use datasets"
          featured_item_url: "/search?q=watershed&per_page=20"
          image_src: "https://www.unr.edu/global/images/unr-stock/CampusImage-FB.jpg"
          image_alt:
            en: "University of Nevada, Reno campus scene"
          reverse: true
        - title:
            en: "Historical maps of the American West"
          description:
            en: "Blend UNR branding with map-first discovery by jumping directly into historical map searches and gallery browsing from the pilot homepage."
          collection_url: "/search?q=historical%20map"
          collection_label:
            en: "Explore historical map results"
          browse_url: "/search?q=historical%20map&view=gallery&per_page=20"
          browse_label:
            en: "Browse historical maps"
          featured_item_title:
            en: "Historical map discovery"
          featured_item_url: "/search?q=historical%20map&view=gallery&per_page=20"
          image_src: "/historical-maps-featured.png"
          image_alt:
            en: "Historical map illustration"
      partner_institutions: []
      blog:
        enabled: false
    footer:
      style: "photo"
      title:
        en: "University Libraries"
      logo_url: "/unr-block-n.svg"
      logo_alt:
        en: "University of Nevada, Reno Block N"
      logo_href: "https://www.unr.edu"
      address_lines:
