id: opengeometadata
label: OpenGeoMetadata
site:
  title:
    en: OpenGeoMetadata Geoportal
  short_name: OpenGeoMetadata
  description:
    en: A configurable geospatial discovery site for a fictitious OpenGeoMetadata institution.
  canonical_url: https://example.org
  locale: en
  supported_locales:
    - en
  show_locale_selector: false
  show_theme_selector: true
  routing:
    mode: browser
  manifest:
    display: standalone
    background_color: '#F6F0D8'
    theme_color: '#111111'
institution:
  name: OpenGeoMetadata
  logo_url: /opengeometadata-bauhaus-logo.svg
  logo_alt:
    en: OpenGeoMetadata geometric logo
  logo_lockup:
    separator: pipe
    right_text:
      en: OpenGeoMetadata
    right_text_style:
      font_family: '"Work Sans", Futura, "Avenir Next", Arial, sans-serif'
      font_weight: 800
      letter_spacing: '0'
    subtext:
      en: Geospatial Discovery School
    subtext_style:
      font_family: '"Work Sans", Futura, "Avenir Next", Arial, sans-serif'
      font_weight: 700
      letter_spacing: 0.16em
  header:
    logo_height_rem: 4.25
    lockup_gap_rem: 0.85
    lockup_separator_height_rem: 3.25
    lockup_text_size_rem: 1.85
  hero_text:
    en: Search maps and data through a precise, modular discovery studio.
  hero_description:
    en: This default theme is intentionally fictitious so new adopters can start from a clean, branded example before comparing the institutional variations in themes/.
branding:
  colors:
    primary: '#111111'
    active: '#0057B8'
    surface: '#FFFDF3'
    surface_alt: '#F6D94D'
    text: '#141414'
    muted: '#5A5547'
    border: '#1E1E1E'
    page_background: '#F6F0D8'
    header_background: '#FFFDF3'
    header_text: '#111111'
    utility_background: '#111111'
    utility_text: 'rgba(255, 253, 243, 0.94)'
    hero_panel_background: 'rgba(255, 253, 243, 0.92)'
    hero_panel_accent: '#D52B1E'
    footer_overlay: 'rgba(17, 17, 17, 0.9)'
    footer_panel_background: 'rgba(246, 217, 77, 0.14)'
    button_primary_hover: '#D52B1E'
    button_secondary_background: '#FFFDF3'
    button_secondary_hover: '#F6D94D'
    button_secondary_text: '#111111'
    button_secondary_border: '#111111'
    lockup_background: '#F6D94D'
    lockup_foreground: '#111111'
  fonts:
    sans: '"Work Sans", Futura, "Avenir Next", Arial, sans-serif'
    heading: '"Work Sans", Futura, "Avenir Next", Arial, sans-serif'
    ui: '"Work Sans", Futura, "Avenir Next", Arial, sans-serif'
api:
  base_url: https://lib-btaageoapi-dev-app-01.oit.umn.edu/api/v1
  search_path: /search
  suggest_path: /suggest
  gazetteer_search_path: /gazetteers/nominatim/search
  facets_path_template: /search/facets/{facetName}
  map_h3_path: /map/h3
  home_blog_posts_path: /home/blog-posts
  turnstile_status_path: /turnstile/status
  turnstile_verify_path: /turnstile/verify
  client_name: opengeometadata-viewer
  default_query_params: []
navigation:
  utility_links:
    - href: /search?q=
      label:
        en: Catalog
      external: false
    - href: /map
      label:
        en: Spatial View
      external: false
  cta:
    href: /search?q=
    label:
      en: Search
    external: false
  links:
    - href: /search?q=
      label:
        en: Search
      external: false
    - href: /map
      label:
        en: Map
      external: false
    - href: /bookmarks
      label:
        en: Bookmarks
      external: false
homepage:
  hero_actions:
    - href: /search?q=
      label:
        en: Search resources
      external: false
    - href: /map
      label:
        en: Open map
      external: false
  featured_items:
    - id: a10a0f50-994e-0134-2096-0050569601ca-c
      camera:
        mode: fitBounds
        duration: 1.5
    - id: c69b75a12ca64324a0109d48db735f6d_0
      camera:
        mode: flyTo
        minZoom: 3
        maxZoom: 10
        padding:
          - 24
          - 24
        verticalOffsetPx: -120
        duration: 1
  collection_spotlights:
    - title:
        en: Primary Shapes, Real Places
      description:
        en: Start with historical maps and public datasets to see how a small institution can feature curated searches without changing application code.
      collection_url: /search?q=historical%20map
      collection_label:
        en: Explore historical maps
      browse_url: /search?q=historical%20map&view=gallery&per_page=20
      browse_label:
        en: Browse gallery
      featured_item_title:
        en: Historical map discovery
      featured_item_url: /search?q=historical%20map&view=gallery&per_page=20
      image_src: /historical-maps-featured.png
      image_alt:
        en: Historical map illustration
    - title:
        en: Modular Urban Layers
      description:
        en: Use spotlight blocks to frame the kinds of records your institution wants users to find first, from city basemaps to field data.
      collection_url: /search?q=urban%20base%20layers
      collection_label:
        en: Explore urban layers
      browse_url: /search?q=urban%20base%20layers&view=gallery&per_page=20
      browse_label:
        en: Browse urban layers
      featured_item_title:
        en: Urban data discovery
      featured_item_url: /search?q=urban%20base%20layers&view=gallery&per_page=20
      image_src: /urban-base-layers-featured.png
      image_alt:
        en: Building footprint map illustration
      reverse: true
  partner_institutions: []
  blog:
    enabled: false
footer:
  style: simple
  title:
    en: OpenGeoMetadata
  logo_url: /opengeometadata-bauhaus-logo.svg
  logo_alt:
    en: OpenGeoMetadata geometric logo
  link_groups:
    - title:
        en: Explore
      links:
        - href: /search?q=
          label:
            en: Search
          external: false
        - href: /map
          label:
            en: Map
          external: false
        - href: /bookmarks
          label:
            en: Bookmarks
          external: false
  copyright:
    en: OpenGeoMetadata fictitious starter theme.
  show_api_debug: true
