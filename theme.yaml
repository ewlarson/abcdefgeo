              label:
                en: "University Homepage"
              external: true
            - href: "https://www.unr.edu/nevada-today"
              label:
                en: "Nevada Today"
              external: true
            - href: "https://www.unr.edu/about"
              label:
                en: "About UNR"
              external: true
            - href: "https://www.unr.edu/privacy"
              label:
                en: "Privacy"
              external: true
