        - "(775) 784-1110"
      background_image_url: "https://www.unr.edu/web-team/uploads/site-footer-bg.jpg"
      link_groups:
        - title:
            en: "Connect"
          links:
            - href: "https://www.unr.edu/contact"
              label:
                en: "Contact"
              external: true
            - href: "https://library.unr.edu/"
              label:
                en: "University Libraries"
              external: true
            - href: "https://maps.unr.edu"
              label:
